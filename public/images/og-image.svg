<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - 深棕色 -->
  <rect width="1200" height="630" fill="#1a1410"/>

  <!-- Gradient overlay -->
  <defs>
    <radialGradient id="glow1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#d0702e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d0702e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#c6a565" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c6a565" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d0702e"/>
      <stop offset="100%" stop-color="#c6a565"/>
    </linearGradient>
  </defs>

  <!-- Glow effects -->
  <ellipse cx="360" cy="200" rx="400" ry="300" fill="url(#glow1)"/>
  <ellipse cx="840" cy="430" rx="350" ry="250" fill="url(#glow2)"/>

  <!-- Stars - 金色點綴 -->
  <circle cx="100" cy="80" r="2" fill="#c6a565" opacity="0.8"/>
  <circle cx="250" cy="150" r="1.5" fill="#c6a565" opacity="0.6"/>
  <circle cx="400" cy="50" r="2" fill="#e08a4a" opacity="0.7"/>
  <circle cx="550" cy="120" r="1" fill="#c6a565" opacity="0.5"/>
  <circle cx="700" cy="60" r="2.5" fill="#d0702e" opacity="0.9"/>
  <circle cx="850" cy="100" r="1.5" fill="#c6a565" opacity="0.6"/>
  <circle cx="1000" cy="80" r="2" fill="#e08a4a" opacity="0.7"/>
  <circle cx="1100" cy="150" r="1" fill="#c6a565" opacity="0.5"/>
  <circle cx="150" cy="500" r="1.5" fill="#c6a565" opacity="0.6"/>
  <circle cx="300" cy="550" r="2" fill="#d0702e" opacity="0.7"/>
  <circle cx="900" cy="520" r="1.5" fill="#c6a565" opacity="0.5"/>
  <circle cx="1050" cy="480" r="2" fill="#e08a4a" opacity="0.8"/>

  <!-- Company Name -->
  <text x="600" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#f5f0eb">
    星智未來
  </text>

  <!-- English Name with gradient -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="600" fill="url(#textGradient)">
    AI Dream
  </text>

  <!-- Slogan -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#c6b8a8">
    用 AI 簡化工作的繁瑣
  </text>

  <!-- Sub slogan -->
  <text x="600" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#8a7a68">
    讓 AI 處理瑣事，你專注重要的事
  </text>

  <!-- Products -->
  <rect x="380" y="500" width="180" height="40" rx="20" fill="#d0702e" fill-opacity="0.2" stroke="#d0702e" stroke-width="1"/>
  <text x="470" y="527" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#e08a4a">
    ContraX
  </text>

  <rect x="640" y="500" width="180" height="40" rx="20" fill="#c6a565" fill-opacity="0.2" stroke="#c6a565" stroke-width="1"/>
  <text x="730" y="527" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#c6a565">
    MemoBot
  </text>

  <!-- Domain -->
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#715725">
    aidream.com.tw
  </text>
</svg>
